databases:
  - name: meridian-db
    plan: free
    databaseName: meridian
    user: meridian

services:
  - type: web
    name: feo-meridian-brands
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python -m gunicorn meridian.asgi:application -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meridian-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: 0
      - key: WEB_CONCURRENCY
        value: 4
      - key: KAESER_BLAIR_DEALER_URL
        value: https://kaesercentral.com/login
